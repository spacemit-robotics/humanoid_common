# ============================================================
# transport_executor 配置示例（基于 G1 实际配置）
# ============================================================
# 通过修改 transport.type 字段在 UDP 和 SHM 之间切换，应用代码无需改动。
# udp 和 shm 两套配置始终完整保留，type 字段决定实际使用哪套。

# ============================================================
# 机器人基础信息（必需）
# ============================================================
robot_base:
  name: "g1"
  num_dof: 29
  robot_dir: "../robot/g1"

# ============================================================
# Transport 配置 — 统一传输接口
# ============================================================
transport:
  # 传输方式选择：udp（跨机器）或 shm（单机多进程）
  type: "udp"

  # UDP 后端配置（跨机器通信）
  udp:
    driver_ip: "10.0.90.6"     # Driver 端 IP（运行 driver_demo 的机器）
    control_ip: "10.0.91.225"  # Control 端 IP（运行 control_demo 的机器）
    state_port: 8800            # Driver → Control，机器人状态数据
    control_port: 8801          # Control → Driver，控制命令
    hmi_port: 8802              # Hmi → Control，键盘命令

  # SHM 后端配置（单机多进程，极低延迟）
  shm:
    prefix: "g1"       # 共享内存名称前缀
                       # 实际创建：/dev/shm/hmrs_g1_state、hmrs_g1_control、hmrs_g1_hmi
    capacity: 4        # 环形缓冲区槽位数
    slot_size: 4096    # 每个槽位大小（字节，需大于最大 packet）
